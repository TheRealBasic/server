<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaos Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" class="hidden">
    <header>
      <h1>Chaos Trigger</h1>
      <button id="closeBtn" type="button">✕</button>
    </header>

    <section class="mode-tabs">
      <button id="chaosTab" class="tab-btn active" type="button">Chaos</button>
      <button id="buildTab" class="tab-btn" type="button">Build</button>
      <button id="trollTab" class="tab-btn" type="button">Secret Troll</button>
    </section>

    <section id="chaosPanel" class="panel">
      <label for="eventSelect">Event</label>
      <select id="eventSelect"></select>
      <p id="eventInfo" class="selector-info">No event selected.</p>
      <label for="eventToggle" class="toggle-row">
        <input id="eventToggle" type="checkbox" checked>
        Enable selected event in rotation
      </label>
      <footer>
        <button id="triggerBtn" type="button">Trigger Event</button>
      </footer>
    </section>

    <section id="trollPanel" class="panel hidden">
      <label for="trollActionSelect">Trolling Action</label>
      <select id="trollActionSelect"></select>
      <p id="trollActionInfo" class="selector-info">No trolling action selected.</p>
      <footer>
        <button id="triggerTrollBtn" type="button">Do Troll Action</button>
      </footer>
    </section>

    <section id="buildPanel" class="panel hidden">
      <label for="buildCategorySelect">Category</label>
      <select id="buildCategorySelect">
        <option value="all">All</option>
        <option value="ramps">Ramps</option>
        <option value="trampolines">Trampolines</option>
        <option value="springs">Springs</option>
        <option value="obstacles">Obstacles</option>
      </select>

      <label for="buildSearchInput">Search</label>
      <input id="buildSearchInput" type="text" placeholder="Filter props...">

      <div class="control-row view-toggle-row">
        <button id="catalogGridBtn" type="button">Grid</button>
        <button id="catalogListBtn" class="active" type="button">List</button>
      </div>

      <div id="buildCatalogList" class="build-catalog list"></div>

      <div class="control-row">
        <button id="buildPlaceBtn" type="button">Place</button>
        <button id="buildCancelBtn" type="button">Cancel</button>
      </div>

      <label class="toggle-row" for="buildSnapToggle">
        <input id="buildSnapToggle" type="checkbox" checked>
        Snap to grid
      </label>

      <label for="buildRotateStep">Rotate step</label>
      <select id="buildRotateStep">
        <option value="5">5°</option>
        <option value="10">10°</option>
        <option value="15" selected>15°</option>
        <option value="30">30°</option>
        <option value="45">45°</option>
      </select>

      <label class="toggle-row" for="buildAttachToggle">
        <input id="buildAttachToggle" type="checkbox">
        Attach mode
      </label>
    </section>

    <section class="targets">
      <label>
        <input id="allPlayers" type="radio" name="targetType" value="all" checked>
        All Players
      </label>
      <label>
        <input id="specificPlayers" type="radio" name="targetType" value="specific">
        Specific Players
      </label>
      <div id="playerList" class="player-list disabled"></div>
    </section>

  </main>

  <aside id="hudPanel" class="hud-panel">
    <div id="hudTimer" class="hud-timer">Next event in: 30s</div>
    <div class="hud-section">
      <h2>Current Event</h2>
      <p id="hudCurrentEvent">Waiting for next event</p>
    </div>
    <div class="hud-section">
      <h2>Previous 4</h2>
      <ul id="hudHistory" class="hud-history">
        <li>No previous events</li>
      </ul>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
